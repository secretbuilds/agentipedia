[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentipedia"
version = "0.1.0"
description = "CLI and SDK for the Agentipedia research platform"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "httpx>=0.27",
    "click>=8.1",
]

[project.scripts]
agp = "agentipedia.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-httpx>=0.34",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentipedia"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
